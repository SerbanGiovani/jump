<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jump</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f5f7fb;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      color: #4b5563;
      line-height: 1.7;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 16px;
    }

    button,
    a.button {
      border: 0;
      border-radius: 6px;
      padding: 12px 16px;
      background: #111827;
      color: #fff;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .result {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 6px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      overflow-wrap: anywhere;
    }

    .result img {
      display: block;
      width: 180px;
      height: 180px;
      margin-top: 14px;
      border: 8px solid #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 560px) {
      main {
        padding: 22px;
      }

      .row {
        flex-direction: column;
      }

      button,
      a.button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>QQ、微信跳转入口</h1>
    <p id="intro">输入需要跳转的链接，生成 GitHub Pages 中转地址和二维码。</p>

    <section id="builder">
      <div class="row">
        <input id="target" placeholder="https://example.com" autocomplete="off">
        <button id="generate" type="button">生成</button>
      </div>
      <div id="result" class="result">
        <strong>中转链接</strong>
        <p><a id="jumpLink" href="#"></a></p>
        <div class="actions">
          <button id="copy" type="button">复制链接</button>
          <a id="open" class="button" href="#">打开测试</a>
        </div>
        <img id="qr" alt="二维码">
      </div>
    </section>

    <section id="jumper" hidden>
      <p>正在打开目标链接。如果没有自动跳转，请点击下面的按钮。</p>
      <a id="go" class="button" href="#">立即打开</a>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const queryTarget = params.get("u") || params.get("url");
    const builder = document.getElementById("builder");
    const jumper = document.getElementById("jumper");
    const targetInput = document.getElementById("target");
    const result = document.getElementById("result");
    const jumpLink = document.getElementById("jumpLink");
    const qr = document.getElementById("qr");
    const openLink = document.getElementById("open");
    const copyButton = document.getElementById("copy");
    const generateButton = document.getElementById("generate");
    const go = document.getElementById("go");

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return "";
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return "https://" + trimmed;
    }

    function buildJumpUrl(target) {
      return location.origin + location.pathname + "?u=" + encodeURIComponent(target);
    }

    function renderResult() {
      const target = normalizeUrl(targetInput.value);
      if (!target) return;
      const url = buildJumpUrl(target);
      jumpLink.href = url;
      jumpLink.textContent = url;
      openLink.href = url;
      qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=" + encodeURIComponent(url);
      result.style.display = "block";
    }

    generateButton.addEventListener("click", renderResult);
    targetInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") renderResult();
    });
    copyButton.addEventListener("click", async () => {
      await navigator.clipboard.writeText(jumpLink.href);
      copyButton.textContent = "已复制";
      setTimeout(() => copyButton.textContent = "复制链接", 1200);
    });

    if (queryTarget) {
      const target = normalizeUrl(queryTarget);
      builder.hidden = true;
      jumper.hidden = false;
      go.href = target;
      setTimeout(() => {
        location.replace(target);
      }, 600);
    }
  </script>
</body>
</html>
