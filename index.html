<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>无限</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f5f7fb;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    .guide-shell {
      position: relative;
      overflow: hidden;
      min-height: 680px;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 215, 122, 0.28), transparent 38%),
        linear-gradient(180deg, #fffaf0 0%, #f6f0e8 48%, #11100d 100%);
      border-color: rgba(187, 128, 34, 0.32);
    }

    .guide-shell > h1,
    .guide-shell > #intro {
      display: none;
    }

    .guide-head {
      position: relative;
      min-height: 190px;
      z-index: 2;
    }

    .wechat-dots {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid #d1d5db;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      z-index: 3;
    }

    .wechat-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #111827;
    }

    .arrow {
      position: absolute;
      top: 72px;
      right: 42px;
      width: 72px;
      height: 88px;
      color: #111827;
      transform: rotate(9deg);
      z-index: 3;
    }

    .guide-content {
      position: relative;
      z-index: 2;
      margin-top: -44px;
      padding: 24px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 22px 60px rgba(16, 14, 10, 0.24);
      backdrop-filter: blur(12px);
    }

    .guide-title-mark {
      position: absolute;
      top: 52px;
      left: 50%;
      z-index: 1;
      transform: translateX(-50%);
      font-family: SimHei, "Microsoft YaHei", Arial, sans-serif;
      font-size: 72px;
      font-weight: 800;
      line-height: 0.88;
      color: #111827;
      letter-spacing: 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      color: #4b5563;
      line-height: 1.7;
    }

    .guide-title {
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.12;
      margin-bottom: 14px;
      max-width: 520px;
    }

    .guide-copy {
      max-width: 560px;
      font-size: 17px;
      color: #374151;
    }

    .steps {
      display: grid;
      gap: 12px;
      margin: 28px 0;
      padding: 0;
      list-style: none;
    }

    .steps li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(229, 231, 235, 0.82);
      background: rgba(255, 255, 255, 0.62);
    }

    .step-num {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #111827;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 700;
    }

    .target-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      background: #eef2ff;
      color: #3730a3;
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    .target-box:empty {
      display: none;
    }

    .inline-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      margin: 0 4px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #e5e7eb;
      vertical-align: middle;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.1);
    }

    .inline-icon.dots {
      gap: 2px;
    }

    .inline-icon.dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #111827;
    }

    .inline-icon.browser svg {
      width: 19px;
      height: 19px;
      stroke: #111827;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 16px;
    }

    button,
    a.button {
      border: 0;
      border-radius: 6px;
      padding: 12px 16px;
      background: #111827;
      color: #fff;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .result {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 6px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      overflow-wrap: anywhere;
    }

    .result img {
      display: block;
      width: 180px;
      height: 180px;
      margin-top: 14px;
      border: 8px solid #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 560px) {
      main {
        padding: 22px;
      }

      .guide-shell {
        min-height: 650px;
      }

      .guide-content {
        margin-top: -42px;
        padding: 20px;
      }

      .guide-title-mark {
        top: 56px;
        left: 50%;
      }

      .row {
        flex-direction: column;
      }

      button,
      a.button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>QQ、微信跳转入口</h1>
    <p id="intro">输入需要跳转的链接，生成 GitHub Pages 引导地址和二维码。</p>

    <section id="builder">
      <div class="row">
        <input id="target" placeholder="https://example.com" autocomplete="off">
        <button id="generate" type="button">生成</button>
      </div>
      <div id="result" class="result">
        <strong>中转链接</strong>
        <p><a id="jumpLink" href="#"></a></p>
        <div class="actions">
          <button id="copy" type="button">复制链接</button>
          <a id="open" class="button" href="#">打开测试</a>
        </div>
        <img id="qr" alt="二维码">
      </div>
    </section>

    <section id="jumper" hidden>
      <p>当前已经在浏览器中，正在为你打开目标链接。</p>
      <a id="go" class="button" href="#">立即打开</a>
    </section>

    <section id="wechatGuide" hidden>
      <div class="guide-head">
        <div class="guide-title-mark">无限</div>
      </div>
      <div class="guide-content">
        <h1 class="guide-title">
          点击右上三个点
          <span class="inline-icon dots" aria-label="三个点菜单">
            <span></span>
            <span></span>
            <span></span>
          </span>
          选择在浏览器
          <span class="inline-icon browser" aria-label="浏览器">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke-width="2"/>
              <path d="M3 12h18M12 3c2.4 2.5 3.7 5.5 3.7 9S14.4 18.5 12 21M12 3C9.6 5.5 8.3 8.5 8.3 12S9.6 18.5 12 21" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          打开
        </h1>
        <p class="guide-copy">当前页面在微信内打开。为保证页面正常访问，请按提示用浏览器打开。</p>
        <ol class="steps">
          <li><span class="step-num">1</span><span>点击右上三个点 <span class="inline-icon dots" aria-label="三个点菜单"><span></span><span></span><span></span></span></span></li>
          <li><span class="step-num">2</span><span>选择在浏览器 <span class="inline-icon browser" aria-label="浏览器"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke-width="2"/><path d="M3 12h18M12 3c2.4 2.5 3.7 5.5 3.7 9S14.4 18.5 12 21M12 3C9.6 5.5 8.3 8.5 8.3 12S9.6 18.5 12 21" stroke-width="2" stroke-linecap="round"/></svg></span> 打开</span></li>
          <li><span class="step-num">3</span><span>浏览器打开后再继续访问。</span></li>
        </ol>
        <div id="guideTarget" class="target-box"></div>
      </div>
    </section>
  </main>

  <script>
    document.title = "无限";
    const params = new URLSearchParams(location.search);
    const targetMap = {
      mwfmm: "https://mwfmm.jiamu9.com/jALp0aRxssr/P6lORxR9GB393m8N"
    };
    const mappedTarget = targetMap[params.get("id") || ""];
    const encodedTarget = params.get("k");
    const queryTarget = mappedTarget || (encodedTarget ? decodeTarget(encodedTarget) : params.get("u") || params.get("url"));
    const builder = document.getElementById("builder");
    const jumper = document.getElementById("jumper");
    const targetInput = document.getElementById("target");
    const result = document.getElementById("result");
    const jumpLink = document.getElementById("jumpLink");
    const qr = document.getElementById("qr");
    const openLink = document.getElementById("open");
    const copyButton = document.getElementById("copy");
    const generateButton = document.getElementById("generate");
    const go = document.getElementById("go");
    const wechatGuide = document.getElementById("wechatGuide");
    const guideTarget = document.getElementById("guideTarget");
    const isWeChat = /MicroMessenger/i.test(navigator.userAgent);

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return "";
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return "https://" + trimmed;
    }

    function encodeTarget(value) {
      const bytes = new TextEncoder().encode(value);
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function decodeTarget(value) {
      try {
        const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
        const binary = atob(padded);
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      } catch (_error) {
        return "";
      }
    }

    function buildJumpUrl(target) {
      const mappedEntry = Object.entries(targetMap).find((entry) => entry[1] === target);
      if (mappedEntry) {
        return location.origin + location.pathname + "?id=" + encodeURIComponent(mappedEntry[0]);
      }
      return location.origin + location.pathname + "?k=" + encodeTarget(target);
    }

    function renderResult() {
      const target = normalizeUrl(targetInput.value);
      if (!target) return;
      const url = buildJumpUrl(target);
      jumpLink.href = url;
      jumpLink.textContent = url;
      openLink.href = url;
      qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=" + encodeURIComponent(url);
      result.style.display = "block";
    }

    generateButton.addEventListener("click", renderResult);
    targetInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") renderResult();
    });
    copyButton.addEventListener("click", async () => {
      await navigator.clipboard.writeText(jumpLink.href);
      copyButton.textContent = "已复制";
      setTimeout(() => copyButton.textContent = "复制链接", 1200);
    });

    if (queryTarget) {
      const target = normalizeUrl(queryTarget);
      builder.hidden = true;
      go.href = target;

      if (isWeChat) {
        document.querySelector("main").classList.add("guide-shell");
        guideTarget.textContent = "";
        wechatGuide.hidden = false;
      } else {
        document.body.innerHTML = "";
        setTimeout(() => {
          location.replace(target);
        }, 100);
      }
    }
  </script>
</body>
</html>
